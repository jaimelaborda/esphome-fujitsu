# Example ESPHome device configuration for a Fujitsu AC on an ESP8266 D1 mini.
# Copy this into your ESPHome dashboard/config, fill in your own keys and secrets.

esphome:
  name: fujitsu-ac
  friendly_name: Fujitsu AC

esp8266:
  board: d1_mini

# Free hardware UART0 (GPIO1/GPIO3) for the AC bus; logs go over the network.
logger:
  baud_rate: 0

uart:
  id: fujitsu_uart
  # 9600 8N1, inverted signalling (see README). If you only ever see
  # "invalid checksum" in the log, set both inverted: to false.
  tx_pin:
    number: GPIO1
    inverted: true
  rx_pin:
    number: GPIO3
    inverted: true
  baud_rate: 9600
  data_bits: 8
  parity: NONE
  stop_bits: 1
  rx_buffer_size: 256

external_components:
  - source: github://jaimelaborda/esphome-fujitsu@master
    components: [fujitsu]
    refresh: 0s

climate:
  - platform: fujitsu
    name: "Fujitsu AC"
    uart_id: fujitsu_uart
    horizontal_swing: true
    presets: true
    log_raw_frames: false
    outdoor_temperature:
      name: "Fujitsu Outdoor Temperature"

# Generate your own key: https://esphome.io/components/api.html
api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Fujitsu-AC Fallback"
    password: !secret ap_password

captive_portal:
